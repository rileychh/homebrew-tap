name: Bump formulae and casks on schedule or request

on:
  workflow_dispatch:
    inputs:
      formulae:
        description: Space-separated formula names (overrides repo-wide enumeration)
        required: false
      casks:
        description: Space-separated cask names (overrides repo-wide enumeration)
        required: false
  schedule:
    # Daily at 08:23 UTC+8
    - cron: "23 0 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    if: github.repository == 'rileychh/homebrew-tap'
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: true

      - name: Enumerate packages in tap
        id: enumerate
        run: |
          TAP_DIR="$(brew --repo rileychh/tap)"
          formulae=()
          casks=()
          for f in "$TAP_DIR"/Formula/*.rb; do
            [[ -e "$f" ]] || continue
            formulae+=("$(basename "$f" .rb)")
          done
          for f in "$TAP_DIR"/Casks/*.rb; do
            [[ -e "$f" ]] || continue
            casks+=("$(basename "$f" .rb)")
          done
          echo "formulae=${formulae[*]}" >> "$GITHUB_OUTPUT"
          echo "casks=${casks[*]}" >> "$GITHUB_OUTPUT"

      - name: Bump
        uses: Homebrew/actions/bump-packages@main
        continue-on-error: true
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          formulae: ${{ inputs.formulae || steps.enumerate.outputs.formulae }}
          casks: ${{ inputs.casks || steps.enumerate.outputs.casks }}
          fork: false
